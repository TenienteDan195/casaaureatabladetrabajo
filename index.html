<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SGA - Casa Áurea Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; }
        .day-card { min-height: 90px; border: 1px solid #f1f5f9; display: flex; flex-direction: column; background: white; }
        .task-pill { font-size: 0.6rem; padding: 2px 4px; margin-top: 2px; border-radius: 4px; border-left: 3px solid; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .task-axel { background: #e0f2fe; color: #0369a1; border-color: #0ea5e9; }
        .task-edwin { background: #fef2f2; color: #991b1b; border-color: #ef4444; }
        .task-jair { background: #f0fdf4; color: #166534; border-color: #22c55e; }
        .is-done { opacity: 0.4; text-decoration: line-through; filter: grayscale(1); }
        .tab-active { border-bottom: 4px solid #4f46e5; color: #4f46e5; font-weight: bold; }
        /* Modal Styles */
        #taskModal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 100; align-items: center; justify-content: center; padding: 20px; }
    </style>
</head>
<body class="bg-slate-100 pb-20 font-sans">

    <div id="taskModal">
        <div class="bg-white w-full max-w-md rounded-2xl p-6 shadow-2xl">
            <h3 class="font-bold text-indigo-900 mb-4 uppercase">Nueva Tarea - <span id="selectedDateText"></span></h3>
            <div class="space-y-4">
                <div>
                    <label class="text-[10px] font-bold text-slate-400 uppercase">Cliente</label>
                    <select id="taskClient" class="w-full border rounded-lg p-2 text-sm outline-none focus:ring-2 focus:ring-indigo-500"></select>
                </div>
                <div>
                    <label class="text-[10px] font-bold text-slate-400 uppercase">Título de la Tarea</label>
                    <input type="text" id="taskTitle" class="w-full border rounded-lg p-2 text-sm outline-none focus:ring-2 focus:ring-indigo-500" placeholder="Ej: Edición de video">
                </div>
                <div>
                    <label class="text-[10px] font-bold text-slate-400 uppercase">Responsable</label>
                    <select id="taskAssigned" class="w-full border rounded-lg p-2 text-sm outline-none focus:ring-2 focus:ring-indigo-500">
                        <option value="Axel">Axel</option>
                        <option value="Edwin">Edwin</option>
                        <option value="Jair">Jair</option>
                    </select>
                </div>
                <div>
                    <label class="text-[10px] font-bold text-slate-400 uppercase">¿Cuándo termina? (Día)</label>
                    <input type="number" id="taskEndDay" class="w-full border rounded-lg p-2 text-sm" min="1" max="31">
                </div>
                <div class="flex gap-2 pt-2">
                    <button onclick="saveTask()" class="flex-1 bg-indigo-600 text-white py-3 rounded-xl font-bold">Guardar</button>
                    <button onclick="closeModal()" class="flex-1 bg-slate-100 text-slate-600 py-3 rounded-xl font-bold">Cancelar</button>
                </div>
            </div>
        </div>
    </div>

    <nav class="bg-white shadow-md sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-4 flex justify-between items-center h-16">
            <h1 class="font-black text-indigo-900 tracking-tighter text-xl uppercase">Casa Áurea</h1>
            <button onclick="toggleAdmin()" id="adminBtn" class="bg-slate-800 text-white px-3 py-1.5 rounded-lg text-xs font-bold transition">🔧 Admin</button>
        </div>
        <div class="flex bg-slate-50 border-t overflow-x-auto text-[10px] uppercase tracking-widest font-bold">
            <button onclick="switchTab('calendar')" class="flex-1 py-3 px-4 tab-active" id="tab-calendar">Calendario</button>
            <button onclick="switchTab('workload')" class="flex-1 py-3 px-4" id="tab-workload">Carga</button>
            <button onclick="switchTab('clients')" class="flex-1 py-3 px-4" id="tab-clients">Clientes</button>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto p-4">
        <section id="view-calendar">
            <div class="bg-white rounded-2xl shadow-sm border p-4">
                <div class="flex justify-between items-center mb-4">
                    <h3 id="monthTitle" class="font-bold text-slate-700 uppercase text-sm"></h3>
                    <div class="flex gap-1">
                        <button onclick="changeMonth(-1)" class="p-2 bg-slate-100 rounded-lg">←</button>
                        <button onclick="changeMonth(1)" class="p-2 bg-slate-100 rounded-lg">→</button>
                    </div>
                </div>
                <div class="calendar-grid text-center text-[9px] font-bold text-slate-400 mb-2 uppercase">
                    <div>D</div><div>L</div><div>M</div><div>M</div><div>J</div><div>V</div><div>S</div>
                </div>
                <div id="calendarContainer" class="calendar-grid"></div>
            </div>
        </section>

        <section id="view-workload" class="hidden">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4" id="workloadGrid">
                <div class="bg-white rounded-2xl shadow-sm border overflow-hidden">
                    <div class="bg-sky-600 p-4 text-white flex justify-between items-center">
                        <span class="font-bold text-xs">AXEL</span>
                        <span id="count-Axel" class="bg-white text-sky-600 px-2 py-0.5 rounded-full text-xs font-black">0</span>
                    </div>
                    <div id="tasks-Axel" class="p-2 space-y-1 min-h-[100px] divide-y"></div>
                </div>
                <div class="bg-white rounded-2xl shadow-sm border overflow-hidden">
                    <div class="bg-red-600 p-4 text-white flex justify-between items-center">
                        <span class="font-bold text-xs">EDWIN</span>
                        <span id="count-Edwin" class="bg-white text-red-600 px-2 py-0.5 rounded-full text-xs font-black">0</span>
                    </div>
                    <div id="tasks-Edwin" class="p-2 space-y-1 min-h-[100px] divide-y"></div>
                </div>
                <div class="bg-white rounded-2xl shadow-sm border overflow-hidden">
                    <div class="bg-green-600 p-4 text-white flex justify-between items-center">
                        <span class="font-bold text-xs">JAIR</span>
                        <span id="count-Jair" class="bg-white text-green-600 px-2 py-0.5 rounded-full text-xs font-black">0</span>
                    </div>
                    <div id="tasks-Jair" class="p-2 space-y-1 min-h-[100px] divide-y"></div>
                </div>
            </div>
        </section>

        <section id="view-clients" class="hidden">
            <div class="bg-white rounded-2xl p-4 shadow-sm border">
                <h3 class="font-bold text-indigo-900 mb-4 uppercase text-xs">Gestión de Clientes</h3>
                <div class="flex gap-2 mb-6">
                    <input type="text" id="newClientName" placeholder="Nombre" class="flex-1 border rounded-lg px-3 py-2 text-sm outline-none">
                    <button onclick="addClient()" class="bg-indigo-600 text-white px-4 py-2 rounded-lg text-sm font-bold">Ok</button>
                </div>
                <div id="clientsContainer" class="grid grid-cols-1 gap-2"></div>
            </div>
        </section>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getDatabase, ref, onValue, push, update, remove } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBBkE788lWfe9EGv0AEHJtGPYlEOpb8VLI",
            authDomain: "casa-aurea-cronograma.firebaseapp.com",
            databaseURL: "https://casa-aurea-cronograma-default-rtdb.firebaseio.com",
            projectId: "casa-aurea-cronograma",
            storageBucket: "casa-aurea-cronograma.firebasestorage.app",
            messagingSenderId: "454700891340",
            appId: "1:454700891340:web:85309039ab9455488f1669"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        window.isAdmin = false;
        let currentMonth = new Date().getMonth(); 
        let currentYear = 2026;
        let clients = {};
        let tasks = {};
        let activeDate = "";

        // Escuchar Clientes y llenar el selector del Modal
        onValue(ref(db, 'casa_aurea/config/clients'), (snap) => {
            clients = snap.val() || {};
            const select = document.getElementById('taskClient');
            select.innerHTML = '';
            Object.entries(clients).forEach(([id, c]) => {
                select.innerHTML += `<option value="${id}">${c.name}</option>`;
            });
            renderClients();
        });

        onValue(ref(db, 'casa_aurea/tasks'), (snap) => {
            tasks = snap.val() || {};
            renderCalendar();
            renderWorkload();
        });

        window.switchTab = (tab) => {
            document.querySelectorAll('main > section').forEach(s => s.classList.add('hidden'));
            document.getElementById(`view-${tab}`).classList.remove('hidden');
            document.querySelectorAll('nav .flex button').forEach(b => b.classList.remove('tab-active'));
            document.getElementById(`tab-${tab}`).classList.add('tab-active');
        };

        window.toggleAdmin = () => {
            if (!window.isAdmin) {
                const pass = prompt("Clave:");
                if (pass === "aurea2026") {
                    window.isAdmin = true;
                    document.getElementById('adminBtn').innerText = "🔓 Admin ON";
                }
            } else {
                window.isAdmin = false;
                document.getElementById('adminBtn').innerText = "🔧 Admin";
            }
            renderCalendar(); renderWorkload(); renderClients();
        };

        window.createTask = (date) => {
            if (!window.isAdmin) return;
            if (Object.keys(clients).length === 0) return alert("Crea un cliente primero");
            activeDate = date;
            document.getElementById('selectedDateText').innerText = date;
            document.getElementById('taskEndDay').value = date.split('-')[2];
            document.getElementById('taskModal').style.display = 'flex';
        };

        window.closeModal = () => { document.getElementById('taskModal').style.display = 'none'; };

        window.saveTask = () => {
            const title = document.getElementById('taskTitle').value;
            const clientId = document.getElementById('taskClient').value;
            const assigned = document.getElementById('taskAssigned').value;
            const endDay = document.getElementById('taskEndDay').value;
            const endDate = `${currentYear}-${(currentMonth + 1).toString().padStart(2, '0')}-${endDay.padStart(2, '0')}`;

            if (title && clientId) {
                push(ref(db, 'casa_aurea/tasks'), {
                    text: title,
                    client: clients[clientId].name,
                    assigned: assigned,
                    start: activeDate,
                    end: endDate,
                    done: false
                });
                closeModal();
                document.getElementById('taskTitle').value = '';
            }
        };

        window.addClient = () => {
            const name = document.getElementById('newClientName').value;
            if (name && window.isAdmin) {
                push(ref(db, 'casa_aurea/config/clients'), { name });
                document.getElementById('newClientName').value = '';
            }
        };

        function renderClients() {
            const container = document.getElementById('clientsContainer');
            container.innerHTML = '';
            Object.entries(clients).forEach(([id, c]) => {
                container.innerHTML += `
                    <div class="bg-indigo-50 p-3 rounded-xl border border-indigo-100 flex justify-between items-center">
                        <span class="text-xs font-bold text-indigo-700 uppercase">${c.name}</span>
                        ${window.isAdmin ? `<button onclick="window.deleteClient('${id}')" class="text-red-400">×</button>` : ''}
                    </div>`;
            });
        }

        window.deleteClient = (id) => { if(confirm("¿Borrar?")) remove(ref(db, `casa_aurea/config/clients/${id}`)); };

        function renderCalendar() {
            const container = document.getElementById('calendarContainer');
            container.innerHTML = '';
            const months = ["Ene","Feb","Mar","Abr","May","Jun","Jul","Ago","Sep","Oct","Nov","Dic"];
            document.getElementById('monthTitle').innerText = `${months[currentMonth]} ${currentYear}`;
            const firstDay = new Date(currentYear, currentMonth, 1).getDay();
            const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();

            for (let i = 0; i < firstDay; i++) container.innerHTML += `<div class="day-card bg-slate-50/50"></div>`;

            for (let day = 1; day <= daysInMonth; day++) {
                const dateKey = `${currentYear}-${(currentMonth + 1).toString().padStart(2, '0')}-${day.toString().padStart(2, '0')}`;
                const dayDiv = document.createElement('div');
                dayDiv.className = 'day-card p-1';
                
                let dayTasks = "";
                Object.entries(tasks).forEach(([id, t]) => {
                    if (dateKey >= t.start && dateKey <= t.end) {
                        dayTasks += `<div class="task-pill task-${t.assigned.toLowerCase()} ${t.done ? 'is-done' : ''}">${t.text}</div>`;
                    }
                });

                dayDiv.innerHTML = `<span class="font-bold text-slate-300 text-[9px]">${day}</span>${dayTasks}`;
                dayDiv.onclick = () => { if(window.isAdmin) window.createTask(dateKey); };
                container.appendChild(dayDiv);
            }
        }

        window.renderWorkload = () => {
            ["Axel", "Edwin", "Jair"].forEach(u => {
                const list = document.getElementById(`tasks-${u}`);
                const countEl = document.getElementById(`count-${u}`);
                list.innerHTML = '';
                let count = 0;
                Object.entries(tasks).forEach(([id, t]) => {
                    if (t.assigned.toLowerCase() === u.toLowerCase() && !t.done) {
                        count++;
                        list.innerHTML += `
                            <div class="py-2 flex justify-between items-center">
                                <div class="flex-1 overflow-hidden">
                                    <span class="text-[8px] font-black text-indigo-400 uppercase">${t.client}</span>
                                    <h4 class="text-[11px] font-bold text-slate-700 truncate">${t.text}</h4>
                                </div>
                                <div class="flex gap-2">
                                    <button onclick="window.toggleTask('${id}', false)" class="bg-indigo-50 text-indigo-600 px-2 py-1 rounded text-[10px] font-bold">✓</button>
                                    ${window.isAdmin ? `<button onclick="window.deleteTask('${id}')" class="text-red-300">×</button>` : ''}
                                </div>
                            </div>`;
                    }
                });
                countEl.innerText = count;
            });
        };

        window.toggleTask = (id, currentStatus) => { update(ref(db, `casa_aurea/tasks/${id}`), { done: !currentStatus }); };
        window.deleteTask = (id) => { if(confirm("¿Eliminar?")) remove(ref(db, `casa_aurea/tasks/${id}`)); };
        window.changeMonth = (dir) => { currentMonth += dir; if (currentMonth < 0) { currentMonth = 11; currentYear--; } if (currentMonth > 11) { currentMonth = 0; currentYear++; } renderCalendar(); };
        window.switchTab('calendar');
    </script>
</body>
</html>
