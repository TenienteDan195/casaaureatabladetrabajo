<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cronograma de Proyecto - Casa Áurea</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; }
        .day-card { min-height: 90px; border: 1px solid #f8fafc; display: flex; flex-direction: column; background: white; }
        @media (min-width: 768px) { .day-card { min-height: 120px; } }
        .task-pill { font-size: 0.65rem; padding: 3px 6px; margin-top: 3px; border-radius: 6px; background: #4f46e5; color: white; font-weight: 600; line-height: 1; }
        .is-done { opacity: 0.4; text-decoration: line-through; background: #94a3b8; }
    </style>
</head>
<body class="bg-slate-50 pb-10 font-sans text-slate-900">

    <header class="bg-white border-b sticky top-0 z-10">
        <div class="max-w-5xl mx-auto px-6 h-20 flex items-center justify-between">
            <div>
                <h1 class="font-black text-indigo-900 text-xl tracking-tighter uppercase leading-none">Casa Áurea</h1>
                <p id="clientName" class="text-[10px] text-slate-400 font-bold uppercase tracking-widest mt-1">Cargando...</p>
            </div>
            <div class="text-right">
                <span id="progressPercent" class="text-2xl font-black text-indigo-600">0%</span>
                <p class="text-[8px] text-slate-400 font-bold uppercase">Progreso</p>
            </div>
        </div>
    </header>

    <main class="max-w-5xl mx-auto p-4 md:p-8">
        <div class="bg-indigo-600 rounded-[2rem] p-8 mb-8 text-white shadow-xl shadow-indigo-100">
            <h2 class="text-3xl font-black tracking-tighter mb-2">Tu Cronograma</h2>
            <p class="text-indigo-100 text-sm opacity-80">Revisa tus próximas entregas y avances.</p>
        </div>

        <div class="bg-white rounded-[2rem] shadow-sm border border-slate-100 overflow-hidden">
            <div class="p-6 border-b flex justify-between items-center bg-slate-50/50">
                <h3 id="monthTitle" class="font-bold text-slate-700 uppercase text-sm"></h3>
                <div class="flex gap-2">
                    <button onclick="changeMonth(-1)" class="w-10 h-10 bg-white border rounded-full shadow-sm flex items-center justify-center">←</button>
                    <button onclick="changeMonth(1)" class="w-10 h-10 bg-white border rounded-full shadow-sm flex items-center justify-center">→</button>
                </div>
            </div>
            <div class="p-4">
                <div class="calendar-grid text-center text-[10px] font-black text-slate-300 mb-4 uppercase">
                    <div>Dom</div><div>Lun</div><div>Mar</div><div>Mié</div><div>Jue</div><div>Vie</div><div>Sáb</div>
                </div>
                <div id="calendarContainer" class="calendar-grid"></div>
            </div>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBBkE788lWfe9EGv0AEHJtGPYlEOpb8VLI",
            authDomain: "casa-aurea-cronograma.firebaseapp.com",
            databaseURL: "https://casa-aurea-cronograma-default-rtdb.firebaseio.com",
            projectId: "casa-aurea-cronograma",
            storageBucket: "casa-aurea-cronograma.firebasestorage.app",
            messagingSenderId: "454700891340",
            appId: "1:454700891340:web:85309039ab9455488f1669"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const urlParams = new URLSearchParams(window.location.search);
        
        // CORRECCIÓN AQUÍ: Buscamos 'id' en lugar de 'view'
        const clientId = urlParams.get('id');
        
        let currentMonth = new Date().getMonth();
        let currentYear = 2026;
        let tasks = {};

        if (!clientId) {
            document.body.innerHTML = `
                <div class="h-screen flex flex-col items-center justify-center text-slate-400 p-10 text-center">
                    <h1 class="text-4xl mb-4 font-black">403</h1>
                    <p class="font-bold uppercase tracking-widest">Acceso Denegado</p>
                    <p class="text-xs mt-2">No se encontró el identificador del proyecto en el enlace.</p>
                </div>`;
        } else {
            // Cargar nombre del cliente
            onValue(ref(db, `casa_aurea/config/clients/${clientId}`), (snap) => {
                const client = snap.val();
                if (client) document.getElementById('clientName').innerText = `Proyecto: ${client.name}`;
            });

            // Cargar tareas
            onValue(ref(db, 'casa_aurea/tasks'), (snap) => {
                tasks = snap.val() || {};
                renderCalendar();
                updateProgress();
            });
        }

        function renderCalendar() {
            const container = document.getElementById('calendarContainer');
            container.innerHTML = '';
            const months = ["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];
            document.getElementById('monthTitle').innerText = `${months[currentMonth]} ${currentYear}`;
            const firstDay = new Date(currentYear, currentMonth, 1).getDay();
            const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();

            for (let i = 0; i < firstDay; i++) container.innerHTML += `<div class="day-card bg-slate-50/30 border-none"></div>`;

            for (let day = 1; day <= daysInMonth; day++) {
                const dateKey = `${currentYear}-${(currentMonth + 1).toString().padStart(2, '0')}-${day.toString().padStart(2, '0')}`;
                const dayDiv = document.createElement('div');
                dayDiv.className = 'day-card p-2';
                
                let dayTasks = "";
                Object.entries(tasks).forEach(([id, t]) => {
                    if (t.clientId === clientId && dateKey >= t.start && dateKey <= t.end) {
                        dayTasks += `<div class="task-pill ${t.done ? 'is-done' : ''}">${t.text}</div>`;
                    }
                });

                dayDiv.innerHTML = `<span class="font-black text-slate-200 text-[10px] mb-1">${day}</span><div class="flex-1 overflow-hidden">${dayTasks}</div>`;
                container.appendChild(dayDiv);
            }
        }

        function updateProgress() {
            let total = 0, done = 0;
            Object.values(tasks).forEach(t => {
                if(t.clientId === clientId) {
                    total++;
                    if(t.done) done++;
                }
            });
            const percent = total > 0 ? Math.round((done / total) * 100) : 0;
            document.getElementById('progressPercent').innerText = `${percent}%`;
        }

        window.changeMonth = (dir) => {
            currentMonth += dir;
            if (currentMonth < 0) { currentMonth = 11; currentYear--; }
            if (currentMonth > 11) { currentMonth = 0; currentYear++; }
            renderCalendar();
        };
    </script>
</body>
</html>
